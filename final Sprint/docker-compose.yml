services:
  mysql:
    image: mysql:8.0
    container_name: studylink_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: studylink
      MYSQL_USER: studylink_user
      MYSQL_PASSWORD: studylink_pass
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  adminer:
    image: adminer
    container_name: studylink_adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
volumes:
  mysql_data:
